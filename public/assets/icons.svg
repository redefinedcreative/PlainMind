<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- =========================================================
       PlainMind icon sprite — SF Symbol recreations.
       Stroke icons: 1.8px, round caps/joins, fill:none.
       Filled icons (.fill): fill:currentColor.
       All inherit currentColor so chips/sections can tint them
       (icon color = filter-type color) and they follow the theme.
       Reference: <svg class="icon"><use href="assets/icons.svg#icon-link"/></svg>
       ========================================================= -->

  <!-- ---- Filter chips ---- -->
  <symbol id="icon-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="3.5" width="7" height="7" rx="1.6"/>
    <rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/>
    <rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/>
    <rect x="13.5" y="13.5" width="7" height="7" rx="1.6"/>
  </symbol>

  <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.5 14.5l5-5"/>
    <path d="M11 7.5l1.2-1.2a3.8 3.8 0 0 1 5.4 5.4l-1.2 1.2"/>
    <path d="M13 16.5l-1.2 1.2a3.8 3.8 0 0 1-5.4-5.4l1.2-1.2"/>
  </symbol>

  <symbol id="icon-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4.5" width="18" height="15" rx="2.6"/>
    <circle cx="8.5" cy="9.5" r="1.7"/>
    <path d="M20.5 15.5l-5-5L5 19.5"/>
  </symbol>

  <symbol id="icon-pdf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
    <path d="M14 3v5h5"/>
    <line x1="8.5" y1="13.5" x2="15.5" y2="13.5"/>
    <line x1="8.5" y1="16.5" x2="13" y2="16.5"/>
  </symbol>

  <symbol id="icon-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="6.5" x2="20" y2="6.5"/>
    <line x1="4" y1="11" x2="14.5" y2="11"/>
    <line x1="4" y1="15.5" x2="20" y2="15.5"/>
    <line x1="4" y1="20" x2="13" y2="20"/>
  </symbol>

  <symbol id="icon-music" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 17V5.5l10-2V15"/>
    <circle cx="6.5" cy="17" r="2.5"/>
    <circle cx="16.5" cy="15" r="2.5"/>
  </symbol>

  <symbol id="icon-podcast" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" fill="currentColor" stroke="none"/>
    <path d="M5.5 11a6.5 6.5 0 0 0 13 0"/>
    <line x1="12" y1="17.5" x2="12" y2="21"/>
    <line x1="8.5" y1="21" x2="15.5" y2="21"/>
  </symbol>

  <symbol id="icon-place" viewBox="0 0 24 24">
    <path fill="currentColor" fill-rule="evenodd" d="M12 2a7.5 7.5 0 0 0-7.5 7.5c0 5.2 7.5 12.5 7.5 12.5s7.5-7.3 7.5-12.5A7.5 7.5 0 0 0 12 2zm0 10.2a2.7 2.7 0 1 1 0-5.4 2.7 2.7 0 0 1 0 5.4z"/>
  </symbol>

  <!-- ---- Bottom nav ---- -->
  <symbol id="icon-library" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="4.5" height="16" rx="1"/>
    <rect x="9.5" y="4" width="4.5" height="16" rx="1"/>
    <path d="M15.6 5.2l3.7 1-2.7 14.2-3.7-1z"/>
  </symbol>

  <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </symbol>

  <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </symbol>

  <!-- ---- Settings ---- -->
  <symbol id="icon-icloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 18.5a4.5 4.5 0 0 1-.7-8.95 6 6 0 0 1 11.55-1.2A4 4 0 0 1 17.5 18.5z"/>
  </symbol>

  <symbol id="icon-stats" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5.5" y1="20" x2="5.5" y2="12"/>
    <line x1="12" y1="20" x2="12" y2="5"/>
    <line x1="18.5" y1="20" x2="18.5" y2="15"/>
  </symbol>

  <symbol id="icon-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13.5V18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4.5"/>
    <path d="M14 4h6v6"/>
    <line x1="20" y1="4" x2="10.5" y2="13.5"/>
  </symbol>

  <symbol id="icon-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 6 15 12 9 18"/>
  </symbol>

  <!-- ---- Share sheet (filled glyphs for colored tiles) ---- -->
  <symbol id="icon-airdrop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8.6 14.4a5 5 0 0 1 6.8 0"/>
    <path d="M5.6 11.4a9 9 0 0 1 12.8 0"/>
    <path d="M12 20.5l-2.6-4.2h5.2z" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="icon-messages" viewBox="0 0 24 24">
    <path fill="currentColor" d="M12 3.5c-5 0-9 3.4-9 7.6 0 2.4 1.3 4.5 3.3 5.9-.2 1.3-.8 2.5-1.6 3.4 1.6-.2 3.1-.8 4.4-1.7 .9.2 1.9.4 2.9.4 5 0 9-3.4 9-7.6S17 3.5 12 3.5z"/>
  </symbol>

  <!-- ---- Quick searches ---- -->
  <symbol id="icon-recent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.5 12a8.5 8.5 0 1 0 2.8-6.3"/>
    <polyline points="3 4.5 3 9 7.5 9"/>
    <polyline points="12 8 12 12 15 13.8"/>
  </symbol>

  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/>
    <line x1="3.5" y1="9.5" x2="20.5" y2="9.5"/>
    <line x1="8" y1="3" x2="8" y2="6.5"/>
    <line x1="16" y1="3" x2="16" y2="6.5"/>
  </symbol>

  <symbol id="icon-tray" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 13.5l2.4-7.6A2 2 0 0 1 7.3 4.5h9.4a2 2 0 0 1 1.9 1.4l2.4 7.6"/>
    <path d="M3 13.5h5l1.4 2.8h5.2L21 13.5v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
  </symbol>

  <!-- ---- Tap indicator (custom ripple) ---- -->
  <symbol id="icon-ripple" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="2.5"/>
    <circle cx="12" cy="12" r="6.5" opacity="0.55"/>
    <circle cx="12" cy="12" r="10.5" opacity="0.25"/>
  </symbol>
</svg>
